<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nobeth AI Chat Hub</title>
    
    <!-- 
      We import "Plus Jakarta Sans" from Google Fonts. 
      This replaces standard system fonts with a clean, modern, and premium typeface.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* 
           =========================================================
           1. CSS VARIABLES & CORE SETUP
           =========================================================
           We define custom properties (variables) for our colors and layout.
           This helps us change colors in one place and keep the code organized.
        */
        :root {
            --bg-color: #0b0c10;          /* Deep space black for the primary background */
            --card-bg: rgba(22, 24, 37, 0.7); /* Translucent dark slate for glassmorphism */
            --text-main: #f3f4f6;        /* Bright white/grey for readable text */
            --text-muted: #9ca3af;       /* Dimmer grey for secondary details */
            
            /* Gradient color points for our premium theme (Indigo to Purple) */
            --primary-grad-start: #6366f1; 
            --primary-grad-end: #a855f7;
            
            --bubble-user: linear-gradient(135deg, #6366f1, #a855f7); /* Gradient for user bubbles */
            --bubble-ai: #1e293b;        /* Slate blue-gray for the AI bubble */
            --border-glow: rgba(99, 102, 241, 0.15); /* Soft glow border color */
            
            --transition-speed: 0.2s;    /* Speed for hover and click animations */
        }

        /* 
           A CSS reset ensures that margins, padding, and box-sizing behave 
           predictably across all browsers (Chrome, Safari, Firefox, Edge).
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif; /* Use the premium font we imported */
        }

        /* 
           =========================================================
           2. BODY & LAYOUT WRAPPERS
           =========================================================
        */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center; /* Center the chat interface horizontally */
            align-items: center;     /* Center the chat interface vertically */
            overflow: hidden;
            position: relative;
        }

        /* 
           These decorative blur circles float behind the main card 
           to create a beautiful, modern neon depth effect.
        */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: 1;
        }
        body::before {
            background: var(--primary-grad-start);
            top: 15%;
            left: 15%;
        }
        body::after {
            background: var(--primary-grad-end);
            bottom: 15%;
            right: 15%;
        }

        /* 
           =========================================================
           3. THE MAIN CHAT CARD (GLASSMORPHISM)
           =========================================================
           Glassmorphic cards use semi-transparent background colors combined with 
           "backdrop-filter" to blur the elements behind them, looking like frosted glass.
        */
        .chat-container {
            width: 90%;
            max-width: 650px;
            height: 80vh;
            max-height: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(16px); /* Frosty glass effect */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); /* Thin outline border */
            border-radius: 24px;         /* Generous rounded corners */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); /* Deep soft shadow */
            
            display: flex;
            flex-direction: column;      /* Stack header, body, and input vertically */
            overflow: hidden;
            z-index: 2;                  /* Place in front of the neon blur circles */
        }

        /* 
           =========================================================
           4. CHAT HEADER
           =========================================================
        */
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Gradient title: makes the text modern and vibrant */
        .chat-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc, #e9d5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Glowing green pulse dot showing that the backend is active */
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.15); }
        }

        /* 
           =========================================================
           5. CHAT MESSAGES DISPLAY AREA
           =========================================================
        */
        .chat-history {
            flex: 1;                  /* Expand to take up all available vertical space */
            padding: 24px;
            overflow-y: auto;          /* Enable scrolling when messages exceed height */
            display: flex;
            flex-direction: column;
            gap: 16px;                 /* Space between separate chat bubbles */
            
            /* Custom styling for scrollbar (sleek scrollbar look) */
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        /* Webkit scrollbar adjustments for Chrome/Safari */
        .chat-history::-webkit-scrollbar {
            width: 6px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        /* 
           =========================================================
           6. BUBBLE STYLES & ENTRY ANIMATIONS
           =========================================================
        */
        .message-row {
            display: flex;
            width: 100%;
            /* Slide-up fade animation when a bubble enters the DOM */
            animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* If the message is from the user, push it to the right */
        .message-row.user {
            justify-content: flex-end;
        }

        /* If the message is from the AI, push it to the left */
        .message-row.ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;           /* Keep bubbles from taking the whole width */
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;     /* Wrap long words gracefully */
        }

        /* Specific styles for User Bubbles */
        .message-row.user .bubble {
            background: var(--bubble-user);
            color: #ffffff;
            border-bottom-right-radius: 4px; /* Distinct corner point */
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        /* Specific styles for AI Bubbles */
        .message-row.ai .bubble {
            background: var(--bubble-ai);
            color: var(--text-main);
            border-bottom-left-radius: 4px; /* Distinct corner point */
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 
           =========================================================
           7. INPUT COMPONENT (FOOTER)
           =========================================================
        */
        .chat-input-bar {
            padding: 18px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(13, 14, 21, 0.5);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* The text input area */
        .chat-input-bar input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all var(--transition-speed);
        }

        /* Focus state: when the user clicks inside the input box, it glows */
        .chat-input-bar input:focus {
            border-color: var(--primary-grad-start);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        /* The "Send" Button with a nice gradient hover animation */
        .send-btn {
            background: linear-gradient(135deg, var(--primary-grad-start), var(--primary-grad-end));
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 14px 24px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all var(--transition-speed);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.2);
        }

        /* Button Hover: Grow slightly and glow brighter */
        .send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(168, 85, 247, 0.35);
            filter: brightness(1.1);
        }

        /* Button Active (Click): Shrink slightly */
        .send-btn:active {
            transform: translateY(1px);
        }

        /* 
           =========================================================
           8. ANIMATED LOADING/PULSING DOTS
           =========================================================
           Shows while we are waiting for the server to reply.
        */
        .typing-loader {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 4px 8px;
        }

        .typing-loader span {
            width: 8px;
            height: 8px;
            background-color: var(--text-muted);
            border-radius: 50%;
            display: inline-block;
            animation: bounce-loader 1.4s infinite ease-in-out both;
        }

        .typing-loader span:nth-child(1) { animation-delay: -0.32s; }
        .typing-loader span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce-loader {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <!-- Main visual chat application card -->
    <div class="chat-container">
        
        <!-- Header: Application name and online status indicator -->
        <header class="chat-header">
            <div class="header-title-container">
                <h1>Nobeth AI Chat Hub</h1>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Server Ready</span>
            </div>
        </header>

        <!-- Message List: Bubbles are added here dynamically by JavaScript -->
        <main class="chat-history" id="chatHistory">
            
            <!-- Beginner Welcome Message -->
            <div class="message-row ai">
                <div class="bubble">
                    👋 Hello! I am your Groq-powered AI assistant. Ask me anything to get started!
                </div>
            </div>

        </main>

        <!-- Input Bar: Where the user types and sends messages -->
        <footer class="chat-input-bar">
            <!-- Textbox for user prompts -->
            <input 
                type="text" 
                id="userInput" 
                placeholder="Type your message here..." 
                autocomplete="off"
            >
            <!-- Clickable send button -->
            <button class="send-btn" id="sendBtn">Send</button>
        </footer>

    </div>

    <!-- 
       =========================================================
       9. CLIENT-SIDE JAVASCRIPT LOGIC (Standard Fetch)
       =========================================================
    -->
    <script>
        // Grab references to HTML elements so we can control them with JS code
        const chatHistory = document.getElementById("chatHistory");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        // Focus the textbox automatically when the webpage loads
        userInput.focus();

        /**
         * Appends a new chat bubble to the message history container.
         * @param {string} text - The content of the message.
         * @param {string} sender - 'user' or 'ai', to decide bubble styling.
         */
        function appendMessage(text, sender) {
            // Create a wrapper div row
            const row = document.createElement("div");
            row.classList.add("message-row", sender);

            // Create the inner content bubble div
            const bubble = document.createElement("div");
            bubble.classList.add("bubble");
            
            // Set message text. Using textContent prevents XSS (security vulnerabilities).
            bubble.textContent = text;

            // Assemble and attach to the container
            row.appendChild(bubble);
            chatHistory.appendChild(row);

            // Auto-scroll the chat container to the absolute bottom so the new message is visible
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        /**
         * Appends a temporary "typing" bubble indicator.
         * Returns the row element so it can be deleted once the response arrives.
         */
        function appendLoader() {
            const row = document.createElement("div");
            row.classList.add("message-row", "ai");
            row.id = "temp-loader"; // Unique ID so we can find it and delete it later

            const bubble = document.createElement("div");
            bubble.classList.add("bubble");

            // Build three bouncing loader dots
            const loaderDiv = document.createElement("div");
            loaderDiv.classList.add("typing-loader");
            
            for (let i = 0; i < 3; i++) {
                loaderDiv.appendChild(document.createElement("span"));
            }

            bubble.appendChild(loaderDiv);
            row.appendChild(bubble);
            chatHistory.appendChild(row);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            return row;
        }

        /**
         * Main action function: reads input, sends request to backend, renders response.
         */
        async function sendMessage() {
            // Retrieve text input and remove leading/trailing spaces
            const promptText = userInput.value.trim();

            // If the textbox is empty, do nothing
            if (!promptText) return;

            // 1. Add User bubble to chat log immediately
            appendMessage(promptText, "user");

            // 2. Clear out the input field so the user can type again
            userInput.value = "";

            // 3. Disable input elements temporarily to prevent double submission
            userInput.disabled = true;
            sendBtn.disabled = true;

            // 4. Add temporary bouncing dot AI loader bubble
            appendLoader();

            try {
                // 5. Send POST request to FastAPI backend using standard browser "fetch()" API
                // - We fetch from the relative URL "/ask" which corresponds to our FastAPI POST route
                // - We set method to "POST"
                // - We notify the server that we are sending JSON data
                // - We stringify our prompt into a JSON body matching our AskRequest Pydantic model
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        prompt: promptText
                    })
                });

                // 6. Remove the loader bubble as we are ready to display the answer
                const loader = document.getElementById("temp-loader");
                if (loader) loader.remove();

                // 7. Process response status
                if (response.ok) {
                    // Extract the JSON data: {"response": "AI text"}
                    const data = await response.json();
                    // Append the AI reply to the history
                    appendMessage(data.response, "ai");
                } else {
                    // If the server returned an error (e.g. 500), read the error message
                    const errorData = await response.json();
                    const errorMessage = errorData.detail || "Server error occurred.";
                    appendMessage(`❌ Error: ${errorMessage}`, "ai");
                }

            } catch (error) {
                // 8. Catch network/connection errors (e.g. server is offline)
                const loader = document.getElementById("temp-loader");
                if (loader) loader.remove();
                
                appendMessage(`❌ Connection failed. Is the backend server running?`, "ai");
                console.error("Fetch error details:", error);
            } finally {
                // 9. Re-enable input fields after response handling completes
                userInput.disabled = false;
                sendBtn.disabled = false;
                
                // Focus the textbox again so the student can continue typing immediately
                userInput.focus();
            }
        }

        // --- BIND EVENT LISTENERS ---

        // Run sendMessage() when user clicks the "Send" button
        sendBtn.addEventListener("click", sendMessage);

        // Run sendMessage() when user presses the "Enter" key inside the textbox
        userInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
